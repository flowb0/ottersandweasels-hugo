{{ $paginator := .Paginator }}
{{ if gt $paginator.TotalPages 1 }}
<nav class="pagination">
  {{ if $paginator.HasPrev }}
  <a href="{{ $paginator.Prev.URL }}" class="page-link prev">&laquo; Prev</a>
  {{ end }}
  {{ range $paginator.Pagers }}
  {{ if eq . $paginator }}
  <span class="page-link current">{{ .PageNumber }}</span>
  {{ else }}
  <a href="{{ .URL }}" class="page-link">{{ .PageNumber }}</a>
  {{ end }}
  {{ end }}
  {{ if $paginator.HasNext }}
  <a href="{{ $paginator.Next.URL }}" class="page-link next">Next &raquo;</a>
  {{ end }}
</nav>
{{ end }}
